<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Capybara Adventure 🍊</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');

        :root {
            --bg-deep: #1b2e1b;       /* Dark forest green */
            --bg-gradient: #2d4c2d;   /* Lighter moss green */
            --accent: #ff9f1c;        /* Capybara orange */
            --highlight: #ffeead;     /* Soft sun yellow */
            --white: #f0f4ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-deep);
            /* A subtle gradient to give the page depth */
            background: radial-gradient(circle at center, var(--bg-gradient) 0%, var(--bg-deep) 100%);
            font-family: 'Nunito', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; /* Prevents double scrolling */
        }

        header {
            padding: 15px;
            text-align: center;
            width: 100%;
        }

        h1.title {
            font-family: 'Fredoka One', cursive;
            color: var(--highlight);
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            letter-spacing: 1px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.3), 0 0 20px rgba(255, 159, 28, 0.4);
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--white);
            opacity: 0.8;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* The container for the game */
        #game-container {
            flex: 1;
            width: 95vw;
            max-width: 1200px;
            margin-bottom: 20px;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid var(--accent);
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            background: #000; /* Backdrop for the iframe */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        footer {
            padding-bottom: 10px;
            font-size: 0.7rem;
            color: var(--white);
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="title">🍊 CAPYBARA ADVENTURE</h1>
        <div class="subtitle">v3.0 • Wilderness Quest</div>
    </header>

    <div id="game-container">
        <iframe 
            src="https://claude.site/public/artifacts/47bda61a-5848-4d10-8aed-7d6d3b17045a/embed" 
            title="capybara-adventure-v3.html" 
            allow="clipboard-write" 
            allowfullscreen>
        </iframe>
    </div>

    <footer>Powered by Claude Artifacts • Hosted on GitHub</footer>

</body>
</html>
